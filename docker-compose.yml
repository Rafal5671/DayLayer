services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: daylayer
      POSTGRES_USER: daylayer
      POSTGRES_PASSWORD: daylayer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daylayer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build: ./backend
    command: celery -A config worker --loglevel=info --pool=solo
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./backend
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scraping-service:
    build: ./scraping-service
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./scraping-service:/app
    ports:
      - "8001:8001"
    env_file:
      - ./scraping-service/.env
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  notification-service:
    build: ./notification-service
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    volumes:
      - ./notification-service:/app
    ports:
      - "8002:8002"
    env_file:
      - ./notification-service/.env
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
