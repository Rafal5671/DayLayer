{% extends "base.html" %} {% block content %}
<h1>Bookmark saved</h1>
<p>We've successfully fetched the details for your saved link.</p>

<div class="card">
    <div class="card-title">Saved bookmark</div>
    <div class="card-content">{{ title }}</div>
</div>

{% if description %}
<p>{{ description }}</p>
{% endif %}

<div class="divider"></div>

<a href="http://localhost:5173/bookmarks" class="btn">View bookmarks</a>
{% endblock %}
