<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    sans-serif;
                background-color: #f4f4f7;
                color: #333;
            }

            .wrapper {
                max-width: 600px;
                margin: 40px auto;
                background: #ffffff;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            }

            .header {
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                padding: 32px 40px;
                text-align: center;
            }

            .header .logo {
                font-size: 28px;
                font-weight: 700;
                color: #ffffff;
                letter-spacing: -0.5px;
            }

            .header .logo span {
                color: #6c63ff;
            }

            .header .tagline {
                font-size: 13px;
                color: #8892b0;
                margin-top: 6px;
            }

            .content {
                padding: 40px;
            }

            .content h1 {
                font-size: 24px;
                font-weight: 700;
                color: #1a1a2e;
                margin-bottom: 12px;
            }

            .content p {
                font-size: 15px;
                line-height: 1.7;
                color: #555;
                margin-bottom: 16px;
            }

            .btn {
                display: inline-block;
                background: #6c63ff;
                color: #ffffff !important;
                text-decoration: none;
                padding: 14px 32px;
                border-radius: 8px;
                font-size: 15px;
                font-weight: 600;
                margin: 8px 0 24px;
            }

            .card {
                background: #f8f8ff;
                border: 1px solid #e8e8f0;
                border-left: 4px solid #6c63ff;
                border-radius: 8px;
                padding: 20px 24px;
                margin: 20px 0;
            }

            .card .card-title {
                font-size: 13px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: #6c63ff;
                margin-bottom: 8px;
            }

            .card .card-content {
                font-size: 15px;
                color: #333;
                font-weight: 500;
            }

            .task-list {
                list-style: none;
                margin: 20px 0;
            }

            .task-list li {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 16px;
                background: #f8f8ff;
                border: 1px solid #e8e8f0;
                border-radius: 8px;
                margin-bottom: 8px;
                font-size: 15px;
                color: #333;
            }

            .task-list li .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #6c63ff;
                flex-shrink: 0;
            }

            .task-list li .priority {
                margin-left: auto;
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                padding: 3px 8px;
                border-radius: 4px;
            }

            .priority.high {
                background: #ffe0e0;
                color: #c0392b;
            }
            .priority.medium {
                background: #fff3e0;
                color: #e67e22;
            }
            .priority.low {
                background: #e0f7e0;
                color: #27ae60;
            }

            .divider {
                height: 1px;
                background: #eee;
                margin: 28px 0;
            }

            .footer {
                background: #f8f8ff;
                padding: 24px 40px;
                text-align: center;
                border-top: 1px solid #eee;
            }

            .footer p {
                font-size: 12px;
                color: #aaa;
                line-height: 1.6;
            }

            .footer a {
                color: #6c63ff;
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="header">
                <div class="logo">Day<span>layer</span></div>
                <div class="tagline">Your personal second brain</div>
            </div>
            <div class="content">{% block content %}{% endblock %}</div>
            <div class="footer">
                <p>
                    You received this email because you have an account at
                    Daylayer.<br />
                    <a href="#">Unsubscribe</a> · <a href="#">Privacy Policy</a>
                </p>
            </div>
        </div>
    </body>
</html>
